services:
  app:
    build:
      context: ..
      dockerfile: codeforge/Dockerfile
    container_name: codeforge-app
    restart: unless-stopped
    ports:
      - "8731:8731"
    volumes:
      - app-data:/app/codeforge/data
    networks:
      - codeforge-net

  nginx:
    image: nginx:alpine
    container_name: codeforge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - codeforge-net

volumes:
  app-data:

networks:
  codeforge-net:
    driver: bridge
