services:
  app:
    build:
      context: ..  # PoC/ directory (to access pipeforge + codemind)
      dockerfile: codeforge/Dockerfile
    container_name: codeforge-app
    restart: unless-stopped
    ports:
      - "8731:8731"
    volumes:
      - app-data:/app/codeforge/data
    environment:
      - CODEFORGE_DB_PATH=/app/codeforge/data/codeforge.db
    networks:
      - codeforge-net

  nginx:
    image: nginx:alpine
    container_name: codeforge-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - codeforge-net

  # Let's Encrypt SSL certificate auto-renewal
  certbot:
    image: certbot/certbot
    container_name: codeforge-certbot
    volumes:
      - ./nginx/certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  app-data:
  certbot-webroot:

networks:
  codeforge-net:
    driver: bridge
