name: Deploy CodeForge

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /app/actions-runner-codeforge/deploy
  DOMAIN: forge.koala.ai.kr

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout codeforge
        uses: actions/checkout@v4
        with:
          path: codeforge

      - name: Checkout pipeforge
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/pipeforge
          path: pipeforge

      - name: Checkout codemind
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/codemind
          path: codemind

      - name: Copy project files
        run: |
          mkdir -p $DEPLOY_PATH
          rsync -a --delete pipeforge/ $DEPLOY_PATH/pipeforge/
          rsync -a --delete codemind/ $DEPLOY_PATH/codemind/
          rsync -a --delete codeforge/ $DEPLOY_PATH/codeforge/

      - name: Build and deploy
        run: |
          cd $DEPLOY_PATH/codeforge
          docker compose down || true
          docker compose build --no-cache
          docker compose up -d

      - name: Health check
        run: |
          for i in 1 2 3 4 5 6; do
            sleep 5
            curl -sf http://localhost:8731/api/projects && echo "CodeForge is running at http://$DOMAIN" && exit 0
            echo "Attempt $i failed, retrying..."
          done
          echo "Health check failed after 6 attempts"
          docker logs codeforge-app --tail 20
          exit 1

      - name: Cleanup old images
        run: docker image prune -f
